{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title">Настройки на профила ⚙️</h2>
                <p class="text-muted">Разкажете повече за себе си, {{ user.username }}.</p>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">Запази промените</button>
                        <a href="{% url 'story-list' %}" class="btn btn-outline-secondary">Отказ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
