{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title">Настройки на профила ⚙️</h2>
                <div class="text-center mb-4">
                    {% if user.avatar %}
                        <img src="{{ user.avatar.url }}" class="rounded-circle shadow" style="width: 150px; height: 150px; object-fit: cover;">
                    {% else %}
                        <div class="bg-light d-inline-block rounded-circle p-4 shadow-sm">
                            <i class="bi bi-person-bounding-box" style="font-size: 4rem; color: #dee2e6;"></i>
                        </div>
                    {% endif %}
                    <p class="mt-2 text-muted small">Текущ аватар</p>
                </div>
                <p class="text-muted">Разкажете повече за себе си, {{ user.username }}.</p>
                <hr>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">Запази промените 📸</button>
                        <a href="{% url 'story-list' %}" class="btn btn-outline-secondary">Отказ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
