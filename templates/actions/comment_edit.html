{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title mb-4">Редактирай коментара си ✏️</h3>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.text }} </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success">Запази промените</button>
                            <a href="{% url 'story-detail' object.story.id %}" class="btn btn-outline-secondary">Отказ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
